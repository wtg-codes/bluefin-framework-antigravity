[antigravity-cloud-native]
image=ghcr.io/ublue-os/ubuntu-toolbox:latest
additional_flags="--device /dev/dri --device /dev/kfd"
home=$HOME/.local/share/antigravity-workspace
additional_packages="wget curl git ca-certificates gnupg x11-apps dbus-x11 libnss3 libgbm1 libasound2t64 google-chrome-stable"
init_hooks="wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/googlechrome-linux-keyring.gpg && echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/googlechrome-linux-keyring.gpg] https://dl.google.com/linux/chrome/deb/ stable main' > /etc/apt/sources.list.d/google.list && sudo apt-get update && sudo apt-get install -y git curl wget jq; curl -LO \"https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl\" && sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl; curl -sS https://webi.sh/k9s | sh; curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 && bash get_helm.sh; curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64 && chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind"
exported_apps=code
unshare_groups=false
unshare_net=false
unshare_ipc=false
unshare_pid=false
unshare_user=false
unshare_cgroup=false
mounts=""
