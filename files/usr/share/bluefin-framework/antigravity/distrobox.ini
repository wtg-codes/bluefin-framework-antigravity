[wtg-workspace]
image=ghcr.io/${GITHUB_REPOSITORY_OWNER}/wtg-workspace:latest
init=false
nvidia=false
pull=true
root=false
replace=true
home=$HOME/.local/share/wtg-workspace
additional_flags="--device /dev/dri --device /dev/kfd -v /run/user/1000/podman/podman.sock:/run/user/1000/podman/podman.sock"
exported_apps="code antigravity-ide"
unshare_groups=false
unshare_net=false
unshare_ipc=false
unshare_pid=false
unshare_user=false
unshare_cgroup=false
mounts=""
