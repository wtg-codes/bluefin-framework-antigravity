[antigravity]
image=ubuntu:24.04
additional_flags="--device /dev/dri --device /dev/kfd"
home=$HOME/.local/share/antigravity-workspace

# 1. Install necessary dependencies for web automation and AI libraries
additional_packages="wget curl git ca-certificates gnupg x11-apps dbus-x11 libnss3 libgbm1 libasound2t64 google-chrome-stable"

# 2. Add Google's official apt repository declaratively
init_hooks="wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/googlechrome-linux-keyring.gpg && echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/googlechrome-linux-keyring.gpg] https://dl.google.com/linux/chrome/deb/ stable main' > /etc/apt/sources.list.d/google.list && apt-get update"

unshare_groups=false
unshare_net=false
unshare_ipc=false
unshare_pid=false
unshare_user=false
unshare_cgroup=false
mounts=""
