---
name: bluebuild
"on":
  schedule:
    - cron:
        "00 06 * * *"  # build at 06:00 UTC every day
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "website/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "website/**"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_file: .yamllint.yml
          strict: true

  build-workspace:
    name: Build Workspace Image
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Push Workspace Image
        uses: docker/build-push-action@v5
        with:
          context: files/workspace
          file: files/workspace/Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/wtg-workspace:latest

  bluebuild:
    name: Build Custom Image
    needs: [lint, build-workspace]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Push Custom Image
        id: build
        uses: blue-build/github-action@c98a71685dcc2fc79d290a09e4a6cb079b05801e
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          push: ${{ github.event_name != 'pull_request' }}
          maximize_build_space: true

      - name: Fetch Image Digest
        id: get-digest
        if: github.event_name != 'pull_request'
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:latest"
          DIGEST=$(skopeo inspect --creds="${{ github.actor }}:${{ github.token }}" docker://$IMAGE | jq -r '.Digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Attest Build Provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.get-digest.outputs.digest }}
          push-to-registry: true

  build-iso:
    name: Build Installer ISO
    runs-on: ubuntu-latest
    needs: bluebuild
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Verify Image Signature (Zero Trust Gate)
        run: |
          cosign verify --key cosign.pub ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.2.2
        id: build
        with:
          arch: x86_64
          image_name: ${{ github.event.repository.name }}
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: 40
          iso_name: antigravity-os-latest.iso

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: antigravity-os-installer
          path: ${{ steps.build.outputs.iso_path }}
          retention-days: 7
