---
name: Build Weekly Standard ISO
on:
  schedule:
    # Runs at 00:00 (midnight) every Sunday
    - cron: '0 0 * * 0'
  # Always include workflow_dispatch so you can test it manually if needed
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-iso:
    name: Build Installer ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Verify Image Signature (Zero Trust Gate)
        run: |
          cosign verify --key cosign.pub ghcr.io/${{ github.repository_owner }}/wtgos:latest

      - name: Build Custom ISO
        uses: jasonn3/build-container-installer@v1.4.0
        id: build
        with:
          arch: x86_64
          image_name: wtgos
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          # AUTHORITATIVE FIX 1: Version Sync
          # Bluefin-DX 'latest' tracks Fedora 41. If you tell Lorax to build
          # a Fedora 40 boot tree for a Fedora 41 container, the UEFI will fail.
          version: 41

          # AUTHORITATIVE FIX 2: Desktop Variant
          # Bluefin is built on GNOME. You MUST declare Silverblue, or Lorax
          # will not structure the EFI and OSTree partitions correctly.
          variant: Silverblue

          # AUTHORITATIVE FIX 3: Secure Boot MOK Enrollment
          # Custom OCI images are signed by your GitHub Actions, not Microsoft.
          # This prompts the UEFI to enroll your custom key on first boot so
          # the motherboard doesn't block the OS.
          enrollment_password: 'universalblue'

          iso_name: wtgOS-latest.iso

      - name: Publish ISO to Release
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/main'   # Only publish when pushing to main
        with:
          tag_name: "weekly-iso"
          name: "wtgOS Weekly Standard Installer"
          files: |
            ${{ steps.build.outputs.iso_path }}/wtgOS-latest.iso
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
