---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: wtgOS
description: wtgOS - Bluefin-DX + Google dev tools for Framework 13.

base-image: ghcr.io/ublue-os/bluefin-dx
image-version: latest

modules:
  - type: files
    files:
      - source: etc
        destination: /etc
      - source: usr
        destination: /usr

  - type: rpm-ostree
    install:
      - bats  # Essential for post-install OS validation

  - type: systemd
    system:
      enable:
        - podman.socket

  - type: kargs
    kargs:
      - amd_pstate=active
      - amdgpu.sg_display=0

  - type: justfiles
    include:
      - wtgOS.just

  - type: default-flatpaks
    configurations:
      - scope: system
        repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
        repo-name: flathub
        repo-title: "Flathub (system-wide)"
        install:
          - org.gnome.Loupe
          - com.visualstudio.code
          - com.google.Chrome
          - com.slack.Slack
          - com.discordapp.Discord
          - de.haeckerfelix.Shortwave

  - type: signing

  - type: script
    scripts:
      - "npm install -g @google/gemini-cli"
      - "pipx install google-adk"
      - "curl -Lo /usr/bin/kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64 && chmod +x /usr/bin/kind"
